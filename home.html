<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind and Daisy UI Ling -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!--Google Font Link Geist-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- fontAwesome CDN link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <title>Github Issue Tracker Home</title>

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <nav class="navbar bg-base-100 shadow sticky top-0 z-2">
      <div class="flex justify-between container mx-auto">
        <div class="flex items-center gap-1">
          <img class="w-10" src="./assets/github-logo.png" alt="logo" />
          <h1 class="text-2xl font-bold hidden md:block">
            GitHub Issues Tracker
          </h1>
        </div>
        <div class="navbar-end flex gap-1">
          <input
          id="search"
            type="text"
            placeholder=" Search issues..."
            class="input input-bordered outline-none w-42 md:w-fit"
          />
          <button class="btn btn-primary">+ New Issue</button>
        </div>
      </div>
    </nav>
  </body>
</html>
