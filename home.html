<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind and Daisy UI Ling -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!--Google Font Link Geist-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- fontAwesome CDN link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <title>Github Issue Tracker Home</title>

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <nav class="navbar bg-base-100 shadow sticky top-0 z-2">
      <div class="flex justify-between container mx-auto">
        <div class="flex items-center gap-1">
          <img class="w-10" src="./assets/github-logo.png" alt="logo" />
          <h1 class="text-2xl font-bold hidden md:block">
            GitHub Issues Tracker
          </h1>
        </div>
        <div class="navbar-end flex gap-1">
          <input
          id="search"
            type="text"
            placeholder=" Search issues..."
            class="input input-bordered outline-none w-42 md:w-fit"
          />
          <button id="logOut" class="btn btn-primary"><i class="fa-solid fa-arrow-right-from-bracket"></i>Sign Out</button>
        </div>
      </div>
    </nav>
    <main class="container mx-auto">
      <!-- conditional buttons -->
      <div id="buttons" class=" py-5 md:py-8 px-2 shadow bg-white flex gap-2 items-center justify-center md:justify-start sticky top-12 z-1">
        <button id="allBtn" class="btn btn-primary">All</button>
        <button  id="openBtn" class="btn">Open</button>
        <button id="closedBtn" class="btn">Closed</button>
      </div>
     
      <!-- issues count section -->
      <section class="px-2 py-5 md:py-10 rounded shadow-sm mt-2 md:mt-5">
        <div class="flex flex-col md:flex-row items-center justify-between">
          <div class="left-side flex flex-col md:flex-row items-center gap-1">
            <div class="bg-purple-300/50 p-2 rounded-full">
              <img src="./assets/Aperture.png" alt="Aperture.png" />
            </div>
            <div class="flex flex-col items-center md:items-start">
              <div class="flex gap-1 text-xl font-bold md:text-2xl">
                <h1 id="totalIssues" >0</h1><p>Issues</p>
              </div>
              <p>Track and manage your project issues </p>
            </div>
          </div>
          <div class="divider mb-0"></div>
          <div class="right-sidd flex items-center gap-4">
            <p>
              <span class="text-green-500 w-5 h-5 rounded-full"
                ><i class="fa-solid fa-circle-dot"></i
              ></span>
              Open
            </p>
            <p>
              <span class="text-purple-500 w-5 h-5"
                ><i class="fa-solid fa-circle-dot"></i> </span
              >Closed
            </p>
          </div>
        </div>
      </section>

      <!--by default all card section -->
      <section id="cardContainer" class=" mx-1 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 ">
      
          <div class="flex justify-between">
            <img src="./assets/Open-Status.png" alt="" />
            <h1 class="text-red-500 py-2 px-5 md:px-8 bg-red-100 rounded-full md:text-xl font-bold">HIGH</h1>
          </div>
          <div class="space-y-2">
            <h1 class="text-2xl font-bold">
              Fix navigation menu on mobile devices
            </h1>
            <p class="text-gray-400 line-clamp-2">
              The navigation menu doesn't collapse properly on mobile devices...
            </p>
          </div>
          <div class="flex gap-2">
            <p class="btn bg-red-100 rounded-full border border-red-500 text-red-500 font-bold">
              <span><i class="fa-solid fa-bug"></i></span> BUG
            </p>
            <p class=" bg-yellow-100 rounded-full  border border-yellow-500 text-yellow-500 font-bold">
              <span><i class="fa-regular fa-life-ring"></i></span> help wanted
            </p>
          </div>
          <div class="divider"></div>
          <div class="space-y-2">
            <p>#1by john_doe</p>
            <p>1/15/2024</p>
          </div>
        </div>
      </section>
        
      <section id="spinner" class="flex items-center justify-center py-20 hidden">
        <span class="loading loading-bars loading-xl"></span>
      </section>

      
       <section id="openCards" class=" grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 hidden">

       </section>
      
       <section id="closedCards" class=" grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 hidden">

       </section>

       
        <section >
            
            <dialog id="issues_modal" class="modal modal-bottom sm:modal-middle ">
              <div id="modal" >
  
              </div>
            </dialog>
        </section>

    
    </main>
    
    <script src="./js/home.js"></script>
  </body>
</html>
