<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind and Daisy UI Ling -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!--Google Font Link Geist-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet" />

    <!-- fontAwesome CDN link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />

    <title>Github Issue Tracker login</title>

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
  <div class="flex flex-col space-y-3 justify-center items-center ">
      <div>
        <div class="hero min-h-screen">
          <div class="hero-content flex-col">
              <div class="card bg-base-100 w-full shrink-0 shadow-2xl p-5 md:p-10">
                <div class="text-center space-y-3">
                  <img class="mx-auto" src="./assets/github-logo.png" alt="" />
                <h1 class="text-3xl font-bold">GitHub Issues Tracker</h1>
                <p class="">Sign in to manage your issues.</p>
              </div>
              <div class="card-body">
                <fieldset class="fieldset">
                  <label class="label">Username</label>
                  <input
                  id="userName"
                    type="text"
                    class="input outline-none"
                    placeholder="Enter Username"
                  />
                  <p id="defaultUser" class="text-purple-500">Default: admin</p>

                  <label class="label">Password</label>
                  <input type="password" id="password" class="input outline-none" placeholder="Password" />
                  <p id="defaultPassword" class="text-purple-500">Default: admin123</p>

                  <button id="signInBtn" class="btn btn-primary mt-4">Sign In</button>

                  <div class="divider">OR</div>
                  <div class="flex flex-col items-center justify-center ">
                    <p class="mb-5 text-sm md:text-lg">Demo Credentials:</p>
                    <h3 class=" text-sm md:text-lg"><span class="font-bold  text-sm md:text-lg">UserName: </span>admin</h3>
                    <h3 class=" text-sm md:text-lg"><span class="font-bold  text-sm md:text-lg">Password: </span> admin123</h3>
                  </div>
                </fieldset>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./js/login.js"></script>
  </body>
</html>
